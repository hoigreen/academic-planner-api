services:
  postgres:
    image: postgres:16
    container_name: academic-planner-db
    restart: always
    environment:
      POSTGRES_DB: academic_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
